syntax = "proto3";

package zad1;

message Korisnik {
	int32 id = 1;
	string ime = 2;
	string prezime = 3;
	optional string adresa = 4;
	repeated string brojeviTelefona = 5;
}

message Poruka {
	string tekst = 1;
}

message KorisnikId {
	int32 id = 1;
}

message OpsegId {
	int32 pocetak = 1;
	int32 kraj = 2;
}

service KorisnikService {
	rpc DodajKorisnika(Korisnik) returns(Poruka);
	rpc DodajKorisnike(stream Korisnik) returns(stream Poruka);
	rpc ObrisiKorisnika(KorisnikId) returns(Poruka);
	rpc ObrisiKorisnike(stream KorisnikId) returns(stream Poruka);
	rpc VratiListuKorisnika(OpsegId) returns(stream Korisnik);
}
